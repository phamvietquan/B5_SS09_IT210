<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RikkeiMall Global</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f8f9fa;}
        .lang-menu { margin-bottom: 40px; }
        .lang-menu a { margin: 0 10px; padding: 10px 20px; text-decoration: none; border: 2px solid #007bff; color: #007bff; border-radius: 5px; font-weight: bold;}
        .lang-menu a:hover { background-color: #007bff; color: white; }
        .content { background: white; max-width: 600px; margin: auto; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 16px; margin: 10px; }
        .btn-cart { background-color: #28a745; }
        .btn-promo { background-color: #dc3545; }
        .btn-login { background-color: #17a2b8; }
    </style>
</head>
<body>

<div class="lang-menu">
    <a href="?lang=en" th:text="#{lang.en}">English</a>
    <a href="?lang=ja" th:text="#{lang.ja}">Japanese</a>
    <a href="?lang=ko" th:text="#{lang.ko}">Korean</a>
</div>

<div class="content">
    <h1 th:text="#{greeting}">Default Greeting</h1>

    <div style="margin-top: 30px;">
        <button class="btn btn-cart" th:text="#{cart}">Cart</button>
        <button class="btn btn-promo" th:text="#{promotion}">Promo</button>
        <button class="btn btn-login" th:text="#{login}">Login</button>
    </div>
</div>

</body>
</html>
